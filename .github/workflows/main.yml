
import random

# Define the board with snakes and ladders
board = {
    3: 22, 5: 8, 11: 26, 20: 29, 17: 4, 19: 7, 27: 1, 21: 9, 23: 15, 25: 10
}

def roll_dice():
    return random.randint(1, 6)

def move_player(player, position):
    dice_roll = roll_dice()
    print(f"{player} rolled a {dice_roll}")
    position += dice_roll
    if position in board:
        position = board[position]
        print(f"{player} encountered a snake or ladder! Moved to {position}")
    return position

def play_game():
    player1_position = 0
    player2_position = 0
    while player1_position < 30 and player2_position < 30:
        player1_position = move_player("Player 1", player1_position)
        if player1_position >= 30:
            print("Player 1 wins!")
            break
        player2_position = move_player("Player 2", player2_position)
        if player2_position >= 30:
            print("Player 2 wins!")
            break

play_game()
